{% extends 'base.html' %}
{% block title %}Rate Doctor{% endblock %}

{% block content %}
<div class="container mt-4">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h2>Rate Your Doctor</h2>
        <a href="{{ url_for('patient.appointments') }}" class="btn btn-outline-secondary btn-sm">← Back</a>
    </div>

    <div class="row justify-content-center">
        <div class="col-md-6">
            <div class="card mb-4">
                <div class="card-body">
                    <p class="mb-1"><strong>Doctor:</strong> Dr. {{ appointment.doctor.user.name }}</p>
                    <p class="mb-0"><strong>Visit Date:</strong> {{ appointment.date_time.strftime('%d %b %Y') }}</p>
                </div>
            </div>

            <form method="POST">
                <div class="mb-4">
                    <label class="form-label d-block">How was your experience?</label>
                    <div class="star-rating">
                        {% for i in range(5, 0, -1) %}
                        <input type="radio" name="rating" id="star{{ i }}" value="{{ i }}" required>
                        <label for="star{{ i }}">★</label>
                        {% endfor %}
                    </div>
                </div>

                <div class="mb-3">
                    <label class="form-label">Comments (optional)</label>
                    <textarea name="comment" class="form-control" rows="3" placeholder="Share your experience..."></textarea>
                </div>

                <button type="submit" class="btn btn-primary w-100">Submit Review</button>
            </form>
        </div>
    </div>
</div>

<style>
    .star-rating {
        display: flex;
        flex-direction: row-reverse;
        justify-content: flex-end;
        gap: 4px;
    }
    .star-rating input {
        display: none;
    }
    .star-rating label {
        font-size: 2.2rem;
        color: #d1d5db;
        cursor: pointer;
        transition: color 0.2s;
    }
    .star-rating input:checked ~ label,
    .star-rating label:hover,
    .star-rating label:hover ~ label {
        color: #f59e0b;
    }
</style>
{% endblock %}
