{% extends 'base.html' %}
{% block title %}My Profile{% endblock %}

{% block content %}
<div class="container mt-4">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h2>My Profile</h2>
        <a href="{{ url_for('doctor.dashboard') }}" class="btn btn-outline-secondary btn-sm">← Back to Dashboard</a>
    </div>

    <div class="row justify-content-center">
        <div class="col-md-6">
            <form method="POST">
                <div class="mb-3">
                    <label class="form-label">Full Name</label>
                    <input type="text" class="form-control" value="{{ current_user.name }}" disabled>
                    <small class="text-muted">Contact admin to change your name.</small>
                </div>

                <div class="mb-3">
                    <label class="form-label">Email</label>
                    <input type="email" class="form-control" value="{{ current_user.email }}" disabled>
                </div>

                <div class="mb-3">
                    <label class="form-label">Specialization</label>
                    <input type="text" name="specialization" class="form-control"
                           value="{{ doctor.specialization or '' }}" placeholder="e.g. Cardiologist">
                </div>

                <div class="mb-3">
                    <label class="form-label">Qualification</label>
                    <input type="text" name="qualification" class="form-control"
                           value="{{ doctor.qualification or '' }}" placeholder="e.g. MBBS, MD">
                </div>

                <div class="mb-3">
                    <label class="form-label">Availability</label>
                    <input type="text" name="availability" class="form-control"
                           value="{{ doctor.availability or '' }}" placeholder="e.g. Mon-Fri, 9AM-5PM">
                </div>

                <button type="submit" class="btn btn-primary w-100">Save Profile</button>
            </form>
        </div>
    </div>
</div>
{% endblock %}
